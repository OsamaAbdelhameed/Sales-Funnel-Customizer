services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=http://spacetimedb:3000
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - spacetimedb

  spacetimedb:
    image: clockworklabs/spacetime:latest
    ports:
      - "3001:3000"
    command: start
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb

volumes:
  spacetimedb_data:
